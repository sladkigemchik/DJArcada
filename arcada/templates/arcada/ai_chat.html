{% extends 'arcada/base.html' %}
{% load static %}

{% block title %}Чат с ИИ{% endblock %}

{% block content %}
<section class="figma-block" style="padding-top: 120px">
    <div class="figma-container">
        <h2 class="section-title">Чат с YandexGPT</h2>
        <div class="chat-container">
            <div class="chat-messages" id="chat-messages">
                <div class="message bot">Привет! Задай мне любой вопрос 😊</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="Напиши сообщение..." class="chat-input">
                <button id="send-btn" class="chat-send-btn">Отправить</button>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
    const chatMessages = document.getElementById('chat-messages');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function addMessage(text, isUser = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = isUser ? 'message user' : 'message bot';
        messageDiv.textContent = text;
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function sendMessage() {
        const question = userInput.value.trim();
        if (!question) return;

        addMessage(question, true);
        userInput.value = '';
        addMessage('...', false);

        try {
            const response = await fetch('/ai/ask/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({ question: question })
            });
            const data = await response.json();
            
            chatMessages.removeChild(chatMessages.lastChild);
            addMessage(data.answer || 'Ошибка: ' + data.error, false);
        } catch (error) {
            chatMessages.removeChild(chatMessages.lastChild);
            addMessage('Ошибка соединения', false);
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
{% endblock %}
