{% extends 'arcada/base.html' %}

{% block content %}
<div class="container">
    <h1 class="section-title">✏️ Редактирование статьи</h1>

    <form method="post" enctype="multipart/form-data" class="add-form">
        {% csrf_token %}
        
        {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}:</label>
                {{ field }}
                {% if field.errors %}
                    <div style="color: #ff4444; font-size: 0.9rem; margin-top: 5px;">
                        {{ field.errors }}
                    </div>
                {% endif %}
            </div>
        {% endfor %}
        
        <div style="display: flex; gap: 15px; margin-top: 30px;">
            {% if user.role == 'moderator' or user.role == 'admin' %}
                <button type="submit" name="action" value="publish" class="hero-btn" style="background: green; border: none; cursor: pointer;">✅ Опубликовать</button>
            {% endif %}
            <a href="{% url 'article_detail' article.slug %}" class="hero-btn" style="background: gray; text-decoration: none;">❌ Отмена</a>
        </div>
    </form>
</div>

<style>
    .add-form input, 
    .add-form select, 
    .add-form textarea {
        width: 100%;
        padding: 12px 15px;
        background: rgba(10, 10, 20, 0.8);
        border: 1px solid rgba(106, 17, 203, 0.5);
        border-radius: 12px;
        color: #f0f0f0;
        font-size: 1rem;
        transition: all 0.3s ease;
    }
    
    .add-form input:focus,
    .add-form select:focus,
    .add-form textarea:focus {
        outline: none;
        border-color: #00f7ff;
        box-shadow: 0 0 10px rgba(0, 247, 255, 0.3);
    }
    
    .add-form select option {
        background: #0a0a14;
        color: #f0f0f0;
    }
    
    .add-form textarea {
        resize: vertical;
        min-height: 150px;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: var(--neon);
        font-weight: bold;
    }
</style>
{% endblock %}
